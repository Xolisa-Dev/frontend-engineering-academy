<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>DOM Manipulation Demo</title>

   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

   <style>
      * {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
      }

      body {
         font-family: 'Inter', sans-serif;
         background: #f4f7fb;
         min-height: 100vh;
         display: flex;
         align-items: center;
         justify-content: center;
         padding: 2rem;
      }

      #domSection {
         background: white;
         padding: 3rem;
         border-radius: 20px;
         box-shadow:
            0 10px 25px rgba(0, 0, 0, 0.08),
            0 4px 10px rgba(0, 0, 0, 0.04);
         max-width: 700px;
         width: 100%;
         text-align: center;
      }

      h1 {
         font-size: 2.5rem;
         font-weight: 700;
         color: #1f2937;
         margin-bottom: 1.5rem;
         cursor: pointer;
         transition: transform 0.2s ease;
      }

      h1:hover {
         transform: translateY(-2px);
      }

      button {
         width: 100%;
         border: none;
         border-radius: 12px;
         padding: 1rem 1.25rem;
         margin-top: 1rem;
         font-size: 1rem;
         font-weight: 500;
         cursor: pointer;
         transition: all 0.2s ease;
      }

      #myParagraph {
         background: #eef2ff;
         color: #3730a3;
      }

      #myParagraph:hover {
         background: #dbe4ff;
      }

      button:last-child {
         background: #2563eb;
         color: white;
      }

      button:last-child:hover {
         background: #1d4ed8;
         transform: translateY(-2px);
      }
   </style>
</head>

<body>
   <div id="domSection">
      <h1 id="myHeading" onclick="changeHeading()">
         Hello, click me!
      </h1>

      <button id="myParagraph" onclick="changeParagraph()">
         We taking it back to the basics to ensure the future is set.
      </button>

      <button onclick="changeBackgroundColor()">
         Make the background blue chomi, click me
      </button>
   </div>

   <script src="miniScript.js"></script>
</body>

</html>
